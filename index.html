<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抱朴·见素｜Postcard Gallery</title>
  <!-- 手机端优化：提前预加载六张图片，避免进入网页后才慢慢请求图片。更新图片后，把 v=3 改成 v=4/v=5 即可强制刷新缓存。 -->
  <link rel="preload" as="image" href="assets/postcard-01.jpg?v=3" fetchpriority="high" />
  <link rel="preload" as="image" href="assets/postcard-02.jpg?v=3" />
  <link rel="preload" as="image" href="assets/postcard-03.jpg?v=3" />
  <link rel="preload" as="image" href="assets/postcard-04.jpg?v=3" />
  <link rel="preload" as="image" href="assets/postcard-05.jpg?v=3" />
  <link rel="preload" as="image" href="assets/postcard-06.jpg?v=3" />
  <style>
    :root {
      --bg: #f5f1e8;
      --ink: #252521;
      --muted: rgba(37, 37, 33, 0.42);
      --hairline: rgba(37, 37, 33, 0.09);
      --card: #2d2c29;
      --card-soft: #3a3834;
      --shadow: rgba(0, 0, 0, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #090908;
      transition: opacity 0.85s ease, visibility 0.85s ease;
    }

    .intro.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #introCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .intro-copy {
      position: relative;
      z-index: 1;
      text-align: center;
      color: rgba(245, 241, 232, 0.88);
      letter-spacing: 0.38em;
      animation: introText 3.2s ease forwards;
    }

    .intro-copy strong {
      display: block;
      margin-bottom: 14px;
      font-size: clamp(24px, 3vw, 48px);
      font-weight: 400;
      letter-spacing: 0.28em;
    }

    .intro-copy span {
      font-size: clamp(10px, 0.85vw, 14px);
      font-style: italic;
      color: rgba(245, 241, 232, 0.54);
    }

    @keyframes introText {
      0% { opacity: 0; transform: translateY(12px); filter: blur(8px); }
      22% { opacity: 1; transform: translateY(0); filter: blur(0); }
      72% { opacity: 1; transform: translateY(0); filter: blur(0); }
      100% { opacity: 0; transform: translateY(-10px); filter: blur(10px); }
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", "Noto Serif SC", "Songti SC", serif;
      overflow: hidden;
    }

    body {
      position: relative;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.2) 30%, transparent 62%),
        linear-gradient(90deg, var(--hairline) 1px, transparent 1px),
        linear-gradient(0deg, var(--hairline) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 14.285vw 100%, 100% 33.33vh, auto;
    }

    .geometry {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .geometry::before,
    .geometry::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid var(--hairline);
      border-radius: 50%;
    }

    .geometry::before {
      width: min(64vw, 920px);
      height: min(64vw, 920px);
    }

    .geometry::after {
      width: min(34vw, 520px);
      height: min(34vw, 520px);
    }

    .line-a,
    .line-b {
      position: absolute;
      width: 130vw;
      height: 1px;
      left: -15vw;
      top: 50%;
      background: var(--hairline);
      transform-origin: center;
    }

    .line-a { transform: rotate(31deg); }
    .line-b { transform: rotate(-31deg); }

    .page {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(24px, 3vw, 48px);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      min-height: 82px;
    }

    .brand-title {
      margin: 0 0 8px;
      font-size: clamp(28px, 2.1vw, 46px);
      font-weight: 500;
      letter-spacing: 0.16em;
      line-height: 1;
    }

    .brand-sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(11px, 0.95vw, 16px);
      font-style: italic;
      letter-spacing: 0.34em;
      white-space: nowrap;
    }

    .author {
      text-align: right;
    }

    .author-name {
      margin: 0 0 10px;
      font-size: clamp(15px, 1.1vw, 22px);
      letter-spacing: 0.28em;
      font-weight: 700;
    }

    .author-sub {
      margin: 0;
      color: var(--muted);
      font-size: clamp(10px, 0.75vw, 13px);
      font-style: italic;
      letter-spacing: 0.28em;
      white-space: nowrap;
    }

    main {
      position: relative;
      display: flex;
      align-items: center;
      min-height: 0;
    }

    .gallery-wrap {
      width: calc(100vw - clamp(24px, 3vw, 48px) * 2);
      margin-left: calc(clamp(24px, 3vw, 48px) * -1);
      margin-right: calc(clamp(24px, 3vw, 48px) * -1);
      overflow: hidden;
    }

    .gallery {
      display: flex;
      align-items: center;
      gap: clamp(34px, 4vw, 86px);
      overflow-x: auto;
      overflow-y: visible;
      padding-block: 7vh 8vh;
      /* 关键修复：左右留白必须等于“屏幕宽度 - 卡片宽度”的一半，
         这样第 1 张和第 6 张也可以真正滑到屏幕正中间。 */
      padding-inline: calc((100vw - min(38vw, 370px)) / 2);
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      cursor: grab;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .gallery::-webkit-scrollbar {
      display: none;
    }

    .gallery.dragging {
      cursor: grabbing;
      scroll-snap-type: none;
      scroll-behavior: auto;
    }

    .postcard {
      flex: 0 0 auto;
      width: min(38vw, 370px);
      position: relative;
      scroll-snap-align: center;
      user-select: none;
      touch-action: pan-x;
      transform: scale(0.9);
      opacity: 0.54;
      z-index: 1;
      transition:
        transform 0.75s cubic-bezier(.2,.7,.2,1),
        opacity 0.75s ease,
        filter 0.75s ease;
    }

    .postcard.active {
      transform: scale(1.18);
      opacity: 1;
      z-index: 5;
    }

    .postcard-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 4px;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08), transparent 55%),
        linear-gradient(135deg, var(--card-soft), var(--card));
      box-shadow: 0 28px 54px -38px var(--shadow);
      overflow: hidden;
      transition: box-shadow 0.75s ease;
    }

    .postcard.active .postcard-frame {
      box-shadow: 0 34px 68px -34px rgba(0, 0, 0, 0.32);
    }

    .postcard img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: blur(3px) saturate(0.55) contrast(0.88);
      transition: filter 0.75s ease, transform 0.75s cubic-bezier(.2,.7,.2,1);
      transform-origin: center;
    }

    .postcard.active img,
    .postcard:focus-visible img {
      filter: blur(0) saturate(1) contrast(1.02);
    }

    .postcard.active:hover img {
      transform: scale(1.04);
    }

    .postcard-frame::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.1) 100%);
      pointer-events: none;
    }

    .postcard-caption {
      margin-top: 24px;
      text-align: center;
      font-size: clamp(13px, 1vw, 17px);
      letter-spacing: 0.22em;
      color: rgba(37, 37, 33, 0.26);
      opacity: 0.5;
      transform: translateY(-6px);
      transition: opacity 0.75s ease, transform 0.75s ease, color 0.75s ease;
      white-space: nowrap;
    }

    .postcard-caption em {
      margin-right: 0.55em;
      font-style: normal;
      font-size: 0.86em;
      letter-spacing: 0.16em;
      color: rgba(37, 37, 33, 0.34);
    }

    .postcard.active .postcard-caption {
      opacity: 1;
      transform: translateY(0);
      color: rgba(37, 37, 33, 0.72);
    }

    .placeholder-content {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      z-index: 1;
      pointer-events: none;
    }

    .num {
      display: block;
      color: rgba(245,241,232,0.58);
      font-size: clamp(36px, 4.2vw, 68px);
      line-height: 1;
      letter-spacing: 0.02em;
      font-weight: 400;
    }

    .label {
      display: block;
      margin-top: 14px;
      color: rgba(245,241,232,0.42);
      font-size: 12px;
      letter-spacing: 0.55em;
    }

    footer {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 24px;
      min-height: 72px;
      color: var(--muted);
      font-size: clamp(10px, 0.82vw, 13px);
      letter-spacing: 0.28em;
    }

    .series {
      text-transform: uppercase;
    }

    .dots {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      padding-bottom: 6px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(37,37,33,0.18);
      border: 0;
      padding: 0;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease;
    }

    .dot.active {
      background: rgba(37,37,33,0.58);
      transform: scale(1.25);
    }

    .note {
      text-align: right;
      color: rgba(37,37,33,0.58);
      font-size: clamp(13px, 1.05vw, 18px);
      letter-spacing: 0.16em;
      line-height: 1.7;
    }

    @media (max-width: 768px) {
      body {
        overflow: hidden;
        background-size: auto, 25vw 100%, 100% 25vh, auto;
      }

      .page {
        padding: 22px 18px;
      }

      header {
        min-height: 100px;
      }

      .brand-title {
        font-size: 28px;
      }

      .brand-sub,
      .author-sub {
        white-space: normal;
        letter-spacing: 0.18em;
        line-height: 1.7;
      }

      .gallery-wrap {
        width: 100vw;
        margin-left: -18px;
        margin-right: -18px;
      }

      .gallery {
        gap: 28px;
        padding-left: 15vw;
        padding-right: 15vw;
      }

      .postcard {
        width: 70vw;
        transform: scale(0.88);
      }

      .postcard.active {
        transform: scale(1.08);
      }

      .postcard-caption {
        margin-top: 18px;
        font-size: 14px;
      }

      footer {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .series,
      .note {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="intro" id="intro" aria-hidden="true">
    <canvas id="introCanvas"></canvas>
    <div class="intro-copy">
      <strong>抱朴・见素</strong>
      <span>From darkness to simplicity</span>
    </div>
  </div>
  <div class="geometry" aria-hidden="true">
    <span class="line-a"></span>
    <span class="line-b"></span>
  </div>

  <div class="page">
    <header>
      <div>
        <h1 class="brand-title">抱朴・见素</h1>
        <p class="brand-sub">From Clay to Object · 2026</p>
      </div>
      <div class="author">
        <p class="author-name">HU FEN</p>
        <p class="author-sub">Return to simplicity, dialogue with the path</p>
      </div>
    </header>

    <main>
      <section class="gallery-wrap" aria-label="Postcard gallery">
        <div class="gallery" id="gallery">
          <!-- 把下面 src 替换成你的六张明信片图片路径，例如 assets/postcard-01.jpg -->
          <article class="postcard" tabindex="0">
            <div class="postcard-frame">
              <img src="assets/postcard-01.jpg?v=3" alt="起源" loading="eager" decoding="async" fetchpriority="high" onerror="this.style.display='none'" />
              <div class="placeholder-content"><span><b class="num">01</b><i class="label">WORK I</i></span></div>
            </div>
            <div class="postcard-caption"><em>01</em>起源</div>
          </article>
          <article class="postcard" tabindex="0">
            <div class="postcard-frame">
              <img src="assets/postcard-02.jpg?v=3" alt="分叉" loading="eager" decoding="async" onerror="this.style.display='none'" />
              <div class="placeholder-content"><span><b class="num">02</b><i class="label">WORK II</i></span></div>
            </div>
            <div class="postcard-caption"><em>02</em>分叉</div>
          </article>
          <article class="postcard" tabindex="0">
            <div class="postcard-frame">
              <img src="assets/postcard-03.jpg?v=3" alt="手迹" loading="eager" decoding="async" onerror="this.style.display='none'" />
              <div class="placeholder-content"><span><b class="num">03</b><i class="label">WORK III</i></span></div>
            </div>
            <div class="postcard-caption"><em>03</em>手迹</div>
          </article>
          <article class="postcard" tabindex="0">
            <div class="postcard-frame">
              <img src="assets/postcard-04.jpg?v=3" alt="日常" loading="eager" decoding="async" onerror="this.style.display='none'" />
              <div class="placeholder-content"><span><b class="num">04</b><i class="label">WORK IV</i></span></div>
            </div>
            <div class="postcard-caption"><em>04</em>日常</div>
          </article>
          <article class="postcard" tabindex="0">
            <div class="postcard-frame">
              <img src="assets/postcard-05.jpg?v=3" alt="无常" loading="eager" decoding="async" onerror="this.style.display='none'" />
              <div class="placeholder-content"><span><b class="num">05</b><i class="label">WORK V</i></span></div>
            </div>
            <div class="postcard-caption"><em>05</em>无常</div>
          </article>
          <article class="postcard" tabindex="0">
            <div class="postcard-frame">
              <img src="assets/postcard-06.jpg?v=3" alt="道路" loading="eager" decoding="async" onerror="this.style.display='none'" />
              <div class="placeholder-content"><span><b class="num">06</b><i class="label">WORK VI</i></span></div>
            </div>
            <div class="postcard-caption"><em>06</em>道路</div>
          </article>
        </div>
      </section>
    </main>

    <footer>
      <div class="series">EXHIBITION 2026 · SERIES 01</div>
      <div class="dots" id="dots" aria-label="Gallery navigation"></div>
      <div class="note">路径的选择<br />从泥土到器物</div>
    </footer>
  </div>

  <script>
    // 手机端优化：在开场动画播放时就先把图片缓存进浏览器。
    const postcardImages = [
      'assets/postcard-01.jpg?v=3',
      'assets/postcard-02.jpg?v=3',
      'assets/postcard-03.jpg?v=3',
      'assets/postcard-04.jpg?v=3',
      'assets/postcard-05.jpg?v=3',
      'assets/postcard-06.jpg?v=3'
    ];

    postcardImages.forEach((src) => {
      const img = new Image();
      img.decoding = 'async';
      img.src = src;
    });

    const intro = document.querySelector('#intro');
    const introCanvas = document.querySelector('#introCanvas');
    const introCtx = introCanvas.getContext('2d');

    function runIntroAnimation() {
      let width = 0;
      let height = 0;
      let dpr = Math.min(window.devicePixelRatio || 1, 2);
      const duration = 3400;
      const particleCount = window.innerWidth < 768 ? 90 : 160;
      const particles = [];

      function resizeIntroCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        introCanvas.width = width * dpr;
        introCanvas.height = height * dpr;
        introCanvas.style.width = `${width}px`;
        introCanvas.style.height = `${height}px`;
        introCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function createParticles() {
        particles.length = 0;
        const maxRadius = Math.hypot(width, height) * 0.55;
        for (let i = 0; i < particleCount; i++) {
          particles.push({
            angle: Math.random() * Math.PI * 2,
            startRadius: Math.random() * 24,
            endRadius: maxRadius * (0.18 + Math.random() * 0.82),
            size: 0.7 + Math.random() * 2.2,
            drift: (Math.random() - 0.5) * 90,
            speed: 0.75 + Math.random() * 0.45,
            alpha: 0.22 + Math.random() * 0.58
          });
        }
      }

      function lerp(start, end, t) {
        return start + (end - start) * t;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function animateIntro(startTime) {
        const now = performance.now();
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(progress);
        const fadeProgress = Math.max(0, (progress - 0.72) / 0.28);

        const bgR = Math.round(lerp(9, 245, eased));
        const bgG = Math.round(lerp(9, 241, eased));
        const bgB = Math.round(lerp(8, 232, eased));
        intro.style.backgroundColor = `rgb(${bgR}, ${bgG}, ${bgB})`;
        intro.style.opacity = String(1 - fadeProgress);

        introCtx.clearRect(0, 0, width, height);
        introCtx.globalCompositeOperation = progress < 0.45 ? 'screen' : 'multiply';

        const cx = width / 2;
        const cy = height / 2;
        particles.forEach((p) => {
          const local = Math.min(1, eased * p.speed);
          const radius = lerp(p.startRadius, p.endRadius, local);
          const wave = Math.sin(progress * Math.PI * 2 + p.angle) * p.drift * (1 - progress);
          const x = cx + Math.cos(p.angle) * radius + Math.cos(p.angle + Math.PI / 2) * wave;
          const y = cy + Math.sin(p.angle) * radius + Math.sin(p.angle + Math.PI / 2) * wave;
          const alpha = Math.sin(progress * Math.PI) * p.alpha * (1 - fadeProgress);
          const tone = Math.round(lerp(246, 36, eased));

          introCtx.beginPath();
          introCtx.fillStyle = `rgba(${tone}, ${tone}, ${tone}, ${alpha})`;
          introCtx.arc(x, y, p.size, 0, Math.PI * 2);
          introCtx.fill();
        });

        introCtx.globalCompositeOperation = 'source-over';

        if (progress < 1) {
          requestAnimationFrame(() => animateIntro(startTime));
        } else {
          intro.classList.add('is-hidden');
          setTimeout(() => intro.remove(), 900);
          window.removeEventListener('resize', handleIntroResize);
        }
      }

      function handleIntroResize() {
        resizeIntroCanvas();
        createParticles();
      }

      resizeIntroCanvas();
      createParticles();
      window.addEventListener('resize', handleIntroResize);
      requestAnimationFrame((time) => animateIntro(time));
    }

    runIntroAnimation();
    const gallery = document.querySelector('#gallery');
    const cards = [...document.querySelectorAll('.postcard')];
    const dotsWrap = document.querySelector('#dots');

    let isDown = false;
    let startX = 0;
    let scrollLeft = 0;
    let hasDragged = false;
    const dragThreshold = 6;

    cards.forEach((card, index) => {
      const dot = document.createElement('button');
      dot.className = 'dot';
      dot.type = 'button';
      dot.setAttribute('aria-label', `跳转到第 ${index + 1} 张明信片`);
      dot.addEventListener('click', () => {
        card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });
      dotsWrap.appendChild(dot);
    });

    const dots = [...document.querySelectorAll('.dot')];

    function setActiveDot() {
      const viewportCenter = gallery.scrollLeft + gallery.clientWidth / 2;
      let activeIndex = 0;
      let minDistance = Infinity;

      cards.forEach((card, index) => {
        const cardCenter = card.offsetLeft + card.clientWidth / 2;
        const distance = Math.abs(viewportCenter - cardCenter);
        if (distance < minDistance) {
          minDistance = distance;
          activeIndex = index;
        }
      });

      dots.forEach((dot, index) => dot.classList.toggle('active', index === activeIndex));
      cards.forEach((card, index) => card.classList.toggle('active', index === activeIndex));
    }

    gallery.addEventListener('scroll', () => window.requestAnimationFrame(setActiveDot));
    window.addEventListener('resize', setActiveDot);
    setActiveDot();

    gallery.addEventListener('wheel', (event) => {
      if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
        event.preventDefault();
        gallery.scrollLeft += event.deltaY;
      }
    }, { passive: false });

    gallery.addEventListener('pointerdown', (event) => {
      isDown = true;
      hasDragged = false;
      gallery.classList.add('dragging');
      gallery.setPointerCapture(event.pointerId);
      startX = event.pageX - gallery.offsetLeft;
      scrollLeft = gallery.scrollLeft;
    });

    function stopDragging(event) {
      isDown = false;
      gallery.classList.remove('dragging');
      if (event && gallery.hasPointerCapture(event.pointerId)) {
        gallery.releasePointerCapture(event.pointerId);
      }
    }

    gallery.addEventListener('pointerleave', stopDragging);
    gallery.addEventListener('pointerup', stopDragging);
    gallery.addEventListener('pointercancel', stopDragging);

    gallery.addEventListener('pointermove', (event) => {
      if (!isDown) return;
      const x = event.pageX - gallery.offsetLeft;
      const walk = (x - startX) * 1.2;

      if (Math.abs(walk) > dragThreshold) {
        hasDragged = true;
      }

      event.preventDefault();
      gallery.scrollLeft = scrollLeft - walk;
    });

    cards.forEach(card => {
      card.addEventListener('click', () => {
        // 防止“拖动结束后触发 click，又自动回到原来的图片”，这就是 01 起源看起来滑不动的原因之一。
        if (hasDragged) return;
        card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });
    });
  </script>
</body>
</html>
